<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                margin: 0;
                padding: 0;
                width: 1920px;
                height: 1080px;
                background: transparent;
                overflow: hidden;
            }

            #glow {
                position: absolute;
                top: 0; left: 0;
                width: 1920px; height: 1080px;
                opacity: 0;
                mix-blend-mode: screen;
                transition: opacity 0.5s ease;
                pointer-events: none;
            }

            /* Gun image pushed off-screen — body overflow:hidden clips it,
               but the drop-shadow (offset -1080px back up) stays visible */
            #glow img {
                display: block;
                width: 1920px; height: 1080px;
                transform: translateY(1080px);
            }

            /* Pulse at ~45 BPM base (1.33s). Each kill:
               - Layer 1: 2px blur  — tight inner/outer edge ring
               - Layer 2: 4px blur  — the ~4px in / 4px out zone
               - Layer 3: 18-22px   — gaussian-feathered aura, ease-in bloom
               mix-blend-mode: screen means black = transparent; glow adds to footage */

            @keyframes pulse1 {
                0%,100% { filter: drop-shadow(0 -1080px 2px rgba(160,0,0,0.20)) drop-shadow(0 -1080px 4px rgba(120,0,0,0.10)) drop-shadow(0 -1080px 18px rgba(100,0,0,0.05)); }
                50%     { filter: drop-shadow(0 -1080px 2px rgba(200,20,20,0.32)) drop-shadow(0 -1080px 4px rgba(165,0,0,0.16)) drop-shadow(0 -1080px 18px rgba(130,0,0,0.08)); }
            }
            @keyframes pulse2 {
                0%,100% { filter: drop-shadow(0 -1080px 2px rgba(195,10,10,0.30)) drop-shadow(0 -1080px 4px rgba(155,0,0,0.15)) drop-shadow(0 -1080px 18px rgba(120,0,0,0.07)); }
                50%     { filter: drop-shadow(0 -1080px 2px rgba(235,30,30,0.45)) drop-shadow(0 -1080px 4px rgba(200,10,10,0.24)) drop-shadow(0 -1080px 19px rgba(150,0,0,0.11)); }
            }
            @keyframes pulse3 {
                0%,100% { filter: drop-shadow(0 -1080px 2px rgba(225,20,20,0.40)) drop-shadow(0 -1080px 4px rgba(185,0,0,0.22)) drop-shadow(0 -1080px 19px rgba(140,0,0,0.09)); }
                50%     { filter: drop-shadow(0 -1080px 2px rgba(255,45,45,0.58)) drop-shadow(0 -1080px 4px rgba(220,10,10,0.34)) drop-shadow(0 -1080px 20px rgba(170,0,0,0.14)); }
            }
            @keyframes pulse4 {
                0%,100% { filter: drop-shadow(0 -1080px 1px rgba(255,200,200,0.30)) drop-shadow(0 -1080px 3px rgba(250,30,30,0.50)) drop-shadow(0 -1080px 4px rgba(200,0,0,0.28)) drop-shadow(0 -1080px 20px rgba(160,0,0,0.12)); }
                50%     { filter: drop-shadow(0 -1080px 1px rgba(255,230,230,0.50)) drop-shadow(0 -1080px 3px rgba(255,55,55,0.70)) drop-shadow(0 -1080px 5px rgba(220,10,10,0.44)) drop-shadow(0 -1080px 21px rgba(180,0,0,0.17)); }
            }
            @keyframes pulse5 {
                0%,100% { filter: drop-shadow(0 -1080px 1px rgba(255,215,215,0.45)) drop-shadow(0 -1080px 3px rgba(255,40,40,0.65)) drop-shadow(0 -1080px 5px rgba(220,0,0,0.40)) drop-shadow(0 -1080px 21px rgba(170,0,0,0.14)); }
                50%     { filter: drop-shadow(0 -1080px 1px #fff)                   drop-shadow(0 -1080px 3px rgba(255,65,65,0.85)) drop-shadow(0 -1080px 5px rgba(240,10,10,0.58)) drop-shadow(0 -1080px 22px rgba(200,0,0,0.20)); }
            }

            /* 45 BPM base = 1.33s; ramps to ~67 BPM at k5. Opacity scales vibrancy. */
            body.k1 #glow { opacity: 0.60; animation: pulse1 1.33s ease-in-out infinite; }
            body.k2 #glow { opacity: 0.72; animation: pulse2 1.20s ease-in-out infinite; }
            body.k3 #glow { opacity: 0.82; animation: pulse3 1.10s ease-in-out infinite; }
            body.k4 #glow { opacity: 0.92; animation: pulse4 1.00s ease-in-out infinite; }
            body.k5 #glow { opacity: 1.00; animation: pulse5 0.90s ease-in-out infinite; }
        </style>
    </head>
    <body>
        <div id="glow">
            <img src="vandal1.png" />
        </div>

        <script>
            var k = 0;
            var CLASSES = ['', 'k1', 'k2', 'k3', 'k4', 'k5'];

            function applyGlow(kills) {
                k = kills;
                document.body.className = CLASSES[kills] || '';
            }

            var params = new URLSearchParams(window.location.search);
            var action = params.get('action');
            k = parseInt(localStorage.getItem('killCount') || '0', 10);
            if (action === 'kill')        { k = Math.min(k + 1, 5); localStorage.setItem('killCount', k); }
            else if (action === 'reset')  { k = 0;                  localStorage.setItem('killCount', k); }
            applyGlow(k);

            window.addEventListener('keydown', function(e) {
                if (e.key === 'k') { k = Math.min(k+1, 5); localStorage.setItem('killCount', k); applyGlow(k); }
                if (e.key === 'r') { k = 0;                localStorage.setItem('killCount', k); applyGlow(k); }
            });
        </script>
    </body>
</html>
