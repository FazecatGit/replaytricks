<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                margin: 0;
                padding: 0;
                width: 1920px;
                height: 1080px;
                background: transparent;
                overflow: hidden;
            }

            #glow {
                position: absolute;
                top: 0; left: 0;
                width: 1920px; height: 1080px;
                opacity: 0;
                transition: opacity 0.5s ease;
                pointer-events: none;
            }

            /* Gun image pushed off-screen — body overflow:hidden clips it,
               but the drop-shadow (offset -1080px back up) stays visible */
            #glow img {
                display: block;
                width: 1920px; height: 1080px;
                transform: translateY(1080px);
            }

            /* Red electrifying orbit — hotspot circling the gun outline
               Shadow offsets orbit around (0, -1080) to compensate for translateY
               4 stacked shadows: white-hot core, bright red, wide red glow, ambient outline */
            @keyframes electrify {
                0%    { filter: drop-shadow(100px -1080px 2px #fff)   drop-shadow(100px -1080px 10px #ff1a1a)  drop-shadow(100px -1080px 30px #aa0000)  drop-shadow(0px -1080px 15px rgba(255,20,20,0.35)); }
                12.5% { filter: drop-shadow( 71px -1009px 3px #ffe0e0) drop-shadow( 71px -1009px 12px #ff2020)  drop-shadow( 71px -1009px 35px #bb0000)  drop-shadow(0px -1080px 15px rgba(255,20,20,0.35)); }
                25%   { filter: drop-shadow(  0px  -980px 2px #fff)   drop-shadow(  0px  -980px 10px #ff1a1a)  drop-shadow(  0px  -980px 30px #aa0000)  drop-shadow(0px -1080px 15px rgba(255,20,20,0.35)); }
                37.5% { filter: drop-shadow(-71px -1009px 4px #ffe8e8) drop-shadow(-71px -1009px 14px #ff3030)  drop-shadow(-71px -1009px 38px #cc0000)  drop-shadow(0px -1080px 15px rgba(255,20,20,0.35)); }
                50%   { filter: drop-shadow(-100px -1080px 2px #fff)   drop-shadow(-100px -1080px 10px #ff1a1a)  drop-shadow(-100px -1080px 30px #aa0000)  drop-shadow(0px -1080px 15px rgba(255,20,20,0.35)); }
                62.5% { filter: drop-shadow(-71px -1151px 3px #ffe0e0) drop-shadow(-71px -1151px 12px #ff2020)  drop-shadow(-71px -1151px 35px #bb0000)  drop-shadow(0px -1080px 15px rgba(255,20,20,0.35)); }
                75%   { filter: drop-shadow(  0px -1180px 2px #fff)   drop-shadow(  0px -1180px 10px #ff1a1a)  drop-shadow(  0px -1180px 30px #aa0000)  drop-shadow(0px -1080px 15px rgba(255,20,20,0.35)); }
                87.5% { filter: drop-shadow( 71px -1151px 4px #ffe8e8) drop-shadow( 71px -1151px 14px #ff3030)  drop-shadow( 71px -1151px 38px #cc0000)  drop-shadow(0px -1080px 15px rgba(255,20,20,0.35)); }
                100%  { filter: drop-shadow(100px -1080px 2px #fff)   drop-shadow(100px -1080px 10px #ff1a1a)  drop-shadow(100px -1080px 30px #aa0000)  drop-shadow(0px -1080px 15px rgba(255,20,20,0.35)); }
            }

            /* Per-kill: faster orbit, higher opacity, subtle flicker */
            body.k1 #glow { opacity: 0.55; animation: electrify 4.0s linear infinite; }
            body.k2 #glow { opacity: 0.70; animation: electrify 3.0s linear infinite; }
            body.k3 #glow { opacity: 0.82; animation: electrify 2.0s linear infinite; }
            body.k4 #glow { opacity: 0.92; animation: electrify 1.3s linear infinite; }
            body.k5 #glow { opacity: 1.00; animation: electrify 0.8s linear infinite; }
        </style>
    </head>
    <body>
        <div id="glow">
            <img src="vandal1.png" />
        </div>

        <script>
            var k = 0;
            var CLASSES = ['', 'k1', 'k2', 'k3', 'k4', 'k5'];

            function applyGlow(kills) {
                k = kills;
                document.body.className = CLASSES[kills] || '';
            }

            var params = new URLSearchParams(window.location.search);
            var action = params.get('action');
            k = parseInt(localStorage.getItem('killCount') || '0', 10);
            if (action === 'kill')        { k = Math.min(k + 1, 5); localStorage.setItem('killCount', k); }
            else if (action === 'reset')  { k = 0;                  localStorage.setItem('killCount', k); }
            applyGlow(k);

            window.addEventListener('keydown', function(e) {
                if (e.key === 'k') { k = Math.min(k+1, 5); localStorage.setItem('killCount', k); applyGlow(k); }
                if (e.key === 'r') { k = 0;                localStorage.setItem('killCount', k); applyGlow(k); }
            });
        </script>
    </body>
</html>
