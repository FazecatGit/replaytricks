<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                margin: 0;
                padding: 0;
                width: 1920px;
                height: 1080px;
                background: transparent;
                overflow: hidden;
            }

            #glow {
                position: absolute;
                top: 0; left: 0;
                width: 1920px; height: 1080px;
                opacity: 0;
                transition: opacity 0.5s ease;
                pointer-events: none;
            }

            /* Gun image pushed off-screen — body overflow:hidden clips it,
               but the drop-shadow (offset -1080px back up) stays visible */
            #glow img {
                display: block;
                width: 1920px; height: 1080px;
                transform: translateY(1080px);
            }

            /* Red electrifying pulse — stationary on the gun outline, tight/inner blur.
               Shadow stays at 0, -1080 to compensate for translateY — no positional movement.
               Blur and brightness pulse to create an electric throb effect. */

            /* Kill 1: dim, slow pulse — dark red */
            @keyframes pulse1 {
                0%,100% { filter: drop-shadow(0 -1080px 3px rgba(180,0,0,0.6))  drop-shadow(0 -1080px 7px rgba(140,0,0,0.3)); }
                50%     { filter: drop-shadow(0 -1080px 5px rgba(200,10,10,0.8)) drop-shadow(0 -1080px 10px rgba(160,0,0,0.4)); }
            }
            /* Kill 2: brighter, tighter */
            @keyframes pulse2 {
                0%,100% { filter: drop-shadow(0 -1080px 3px rgba(220,15,15,0.7))  drop-shadow(0 -1080px 7px rgba(180,0,0,0.35)); }
                50%     { filter: drop-shadow(0 -1080px 5px rgba(240,30,30,0.9))  drop-shadow(0 -1080px 10px rgba(200,10,10,0.5)); }
            }
            /* Kill 3: vivid red, white-hot edge starts appearing */
            @keyframes pulse3 {
                0%,100% { filter: drop-shadow(0 -1080px 2px rgba(255,200,200,0.5)) drop-shadow(0 -1080px 4px rgba(255,30,30,0.8))  drop-shadow(0 -1080px 8px rgba(200,0,0,0.4)); }
                50%     { filter: drop-shadow(0 -1080px 3px rgba(255,230,230,0.7)) drop-shadow(0 -1080px 6px rgba(255,50,50,1.0))  drop-shadow(0 -1080px 11px rgba(220,0,0,0.55)); }
            }
            /* Kill 4: intense, tight white core + red */
            @keyframes pulse4 {
                0%,100% { filter: drop-shadow(0 -1080px 2px rgba(255,220,220,0.7)) drop-shadow(0 -1080px 4px rgba(255,40,40,0.9))  drop-shadow(0 -1080px 8px rgba(220,0,0,0.5)); }
                33%     { filter: drop-shadow(0 -1080px 3px rgba(255,255,255,0.9)) drop-shadow(0 -1080px 5px rgba(255,60,60,1.0))  drop-shadow(0 -1080px 10px rgba(240,10,10,0.65)); }
                66%     { filter: drop-shadow(0 -1080px 1px rgba(255,180,180,0.6)) drop-shadow(0 -1080px 3px rgba(255,35,35,0.85)) drop-shadow(0 -1080px 7px rgba(210,0,0,0.45)); }
            }
            /* Kill 5: max vibrancy, electric flicker, white-hot core */
            @keyframes pulse5 {
                0%,100% { filter: drop-shadow(0 -1080px 2px #fff)                  drop-shadow(0 -1080px 4px rgba(255,50,50,1.0))  drop-shadow(0 -1080px 9px rgba(240,0,0,0.6)); }
                25%     { filter: drop-shadow(0 -1080px 1px rgba(255,200,200,0.7)) drop-shadow(0 -1080px 3px rgba(255,30,30,0.85)) drop-shadow(0 -1080px 7px rgba(210,0,0,0.4)); }
                50%     { filter: drop-shadow(0 -1080px 3px #fff)                  drop-shadow(0 -1080px 5px rgba(255,60,60,1.0))  drop-shadow(0 -1080px 10px rgba(255,10,10,0.7)); }
                75%     { filter: drop-shadow(0 -1080px 1px rgba(255,180,180,0.6)) drop-shadow(0 -1080px 4px rgba(255,45,45,0.9))  drop-shadow(0 -1080px 8px rgba(230,0,0,0.5)); }
            }

            /* Per-kill: each uses its own animation with increasing vibrancy and speed */
            body.k1 #glow { opacity: 0.65; animation: pulse1 2.0s ease-in-out infinite; }
            body.k2 #glow { opacity: 0.75; animation: pulse2 1.6s ease-in-out infinite; }
            body.k3 #glow { opacity: 0.85; animation: pulse3 1.2s ease-in-out infinite; }
            body.k4 #glow { opacity: 0.92; animation: pulse4 0.8s ease-in-out infinite; }
            body.k5 #glow { opacity: 1.00; animation: pulse5 0.5s ease-in-out infinite; }
        </style>
    </head>
    <body>
        <div id="glow">
            <img src="vandal1.png" />
        </div>

        <script>
            var k = 0;
            var CLASSES = ['', 'k1', 'k2', 'k3', 'k4', 'k5'];

            function applyGlow(kills) {
                k = kills;
                document.body.className = CLASSES[kills] || '';
            }

            var params = new URLSearchParams(window.location.search);
            var action = params.get('action');
            k = parseInt(localStorage.getItem('killCount') || '0', 10);
            if (action === 'kill')        { k = Math.min(k + 1, 5); localStorage.setItem('killCount', k); }
            else if (action === 'reset')  { k = 0;                  localStorage.setItem('killCount', k); }
            applyGlow(k);

            window.addEventListener('keydown', function(e) {
                if (e.key === 'k') { k = Math.min(k+1, 5); localStorage.setItem('killCount', k); applyGlow(k); }
                if (e.key === 'r') { k = 0;                localStorage.setItem('killCount', k); applyGlow(k); }
            });
        </script>
    </body>
</html>
