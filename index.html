<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                margin: 0;
                padding: 0;
                width: 1920px;
                height: 1080px;
                background: transparent;
                overflow: hidden;
            }

            #glow {
                position: absolute;
                top: 0; left: 0;
                width: 1920px; height: 1080px;
                mix-blend-mode: screen;
                opacity: 0;
                transition: opacity 0.5s ease;
                pointer-events: none;
            }

            /* One orbit animation — hue cycles as the hotspot rotates around the gun */
            @keyframes orbit {
                0%   { filter: drop-shadow( 80px   0px 14px hsl(  0,100%,72%)) drop-shadow(0 0 40px hsl(  0,100%,55%)); }
                12%  { filter: drop-shadow( 57px  57px 14px hsl( 45,100%,72%)) drop-shadow(0 0 40px hsl( 45,100%,55%)); }
                25%  { filter: drop-shadow(  0px  80px 14px hsl( 90,100%,72%)) drop-shadow(0 0 40px hsl( 90,100%,55%)); }
                37%  { filter: drop-shadow(-57px  57px 14px hsl(135,100%,72%)) drop-shadow(0 0 40px hsl(135,100%,55%)); }
                50%  { filter: drop-shadow(-80px   0px 14px hsl(180,100%,72%)) drop-shadow(0 0 40px hsl(180,100%,55%)); }
                62%  { filter: drop-shadow(-57px -57px 14px hsl(225,100%,72%)) drop-shadow(0 0 40px hsl(225,100%,55%)); }
                75%  { filter: drop-shadow(  0px -80px 14px hsl(270,100%,72%)) drop-shadow(0 0 40px hsl(270,100%,55%)); }
                87%  { filter: drop-shadow( 57px -57px 14px hsl(315,100%,72%)) drop-shadow(0 0 40px hsl(315,100%,55%)); }
                100% { filter: drop-shadow( 80px   0px 14px hsl(360,100%,72%)) drop-shadow(0 0 40px hsl(360,100%,55%)); }
            }

            /* Per-kill intensity: speed increases, opacity rises */
            body.k1 #glow { opacity: 0.55; animation: orbit 4.0s linear infinite; }
            body.k2 #glow { opacity: 0.70; animation: orbit 3.0s linear infinite; }
            body.k3 #glow { opacity: 0.82; animation: orbit 2.0s linear infinite; }
            body.k4 #glow { opacity: 0.92; animation: orbit 1.3s linear infinite; }
            body.k5 #glow { opacity: 1.00; animation: orbit 0.8s linear infinite; }
        </style>
    </head>
    <body>
        <img id="glow" src="vandal1.png" />

        <script>
            var k = 0;
            var CLASSES = ['', 'k1', 'k2', 'k3', 'k4', 'k5'];

            function applyGlow(kills) {
                k = kills;
                document.body.className = CLASSES[kills] || '';
            }

            var params = new URLSearchParams(window.location.search);
            var action = params.get('action');
            k = parseInt(localStorage.getItem('killCount') || '0', 10);
            if (action === 'kill')        { k = Math.min(k + 1, 5); localStorage.setItem('killCount', k); }
            else if (action === 'reset')  { k = 0;                  localStorage.setItem('killCount', k); }
            applyGlow(k);

            window.addEventListener('keydown', function(e) {
                if (e.key === 'k') { k = Math.min(k+1, 5); localStorage.setItem('killCount', k); applyGlow(k); }
                if (e.key === 'r') { k = 0;                localStorage.setItem('killCount', k); applyGlow(k); }
            });
        </script>
    </body>
</html>
